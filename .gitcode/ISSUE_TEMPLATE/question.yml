name: ▶️ question
description: 反馈安装、使用过程中的问题
title: "[Question]: "
labels: ["question"]

body:
- type: markdown
  attributes:
    value: >
      **在提交新问题之前，请确保您已经在社区中搜索过相关问题，并使用了社区中提供的资源/工具后，仍未找到满意的解决方式。**
- type: textarea
  attributes:
    label: 环境信息
    description: |
      请粘贴您当前的环境信息。
    value: |
      ```
      例如：
      - 操作系统，软件
      - 安装的对应软件版本
      ```
  validations:
    required: true
- type: textarea
  attributes:
    label: 使用场景及问题
    description: |
      请详细描述你的使用场景，以及当前所遇到的问题。

      若该问题可通过代码复现，烦请提供 **最小可复现示例** ，方便我们直接运行代码重现该错误。
      代码片段请尽量保持极简，务必剔除所有无关代码、冗余逻辑及业务依赖，这能极大提升我们的问题排查效率。
      我们会直接使用你提供的代码进行测试，因此请确保代码无需依赖外部数据/服务即可运行，并完整包含所需的导入语句与基础配置。

      此外，请粘贴或详细描述你实际观察到的运行结果。
      若运行过程中出现报错，请完整粘贴错误信息，其中必须包含异常的 **完整堆栈(Full Traceback)** 。
      为了提升信息可读性，建议将错误日志及代码分别使用代码标注格式 ```` ``` 三引号进行标记，有助于其他开发者快速查阅与分析。
- type: markdown
  attributes:
    value: >
      欢迎加入社区，感谢您对社区的贡献 🎉!